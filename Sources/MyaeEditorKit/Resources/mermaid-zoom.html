<!doctype html>
<html>
<head>
<meta charset="utf-8">
<!-- Full-size mermaid viewer for MermaidZoomView.swift: renders one diagram at
     natural size and adds pan (drag) + zoom (wheel / Swift buttons). Bundled
     mermaid 11.16.0, shared with mermaid.html. -->
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  #viewport { position: absolute; inset: 0; cursor: grab; }
  #viewport.grabbing { cursor: grabbing; }
  #stage { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
  #stage svg { display: block; }
</style>
<script src="mermaid.min.js"></script>
</head>
<body>
<div id="viewport"><div id="stage"></div></div>
<script>
let seq = 0, scale = 1, tx = 0, ty = 0, natW = 0, natH = 0;
const MIN = 0.1, MAX = 8;
const vp = document.getElementById('viewport');
const stage = document.getElementById('stage');

function apply() {
  stage.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
}

// Fit the whole diagram in view and center it (initial state and "reset").
function resetZoom() {
  const vw = vp.clientWidth, vh = vp.clientHeight;
  if (natW > 0 && natH > 0) {
    const s = Math.min(vw / natW, vh / natH);
    scale = Math.min(MAX, Math.max(MIN, s > 0 ? s : 1));
  } else {
    scale = 1;
  }
  tx = (vw - natW * scale) / 2;
  ty = (vh - natH * scale) / 2;
  apply();
}

// Zoom by `factor`, keeping the point (cx, cy) in viewport coords fixed.
function zoomAt(factor, cx, cy) {
  const ns = Math.min(MAX, Math.max(MIN, scale * factor));
  if (ns === scale) return;
  tx = cx - (cx - tx) * (ns / scale);
  ty = cy - (cy - ty) * (ns / scale);
  scale = ns;
  apply();
}

// Called from Swift zoom buttons: zoom toward the viewport center.
function zoomBy(factor) { zoomAt(factor, vp.clientWidth / 2, vp.clientHeight / 2); }

vp.addEventListener('wheel', function (e) {
  e.preventDefault();
  const r = vp.getBoundingClientRect();
  zoomAt(e.deltaY < 0 ? 1.1 : 1 / 1.1, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

let dragging = false, lastX = 0, lastY = 0;
vp.addEventListener('mousedown', function (e) {
  dragging = true; lastX = e.clientX; lastY = e.clientY; vp.classList.add('grabbing');
});
window.addEventListener('mousemove', function (e) {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY; apply();
});
window.addEventListener('mouseup', function () { dragging = false; vp.classList.remove('grabbing'); });
window.addEventListener('resize', resetZoom);

// Render `code` at natural size, measure it, then fit-to-view.
//   theme: 'default' | 'dark';  bg: opaque page background hex
async function renderMermaid(code, theme, bg) {
  document.documentElement.style.background = bg;
  document.body.style.background = bg;

  mermaid.initialize({
    startOnLoad: false,
    theme: theme,
    securityLevel: 'strict',
    suppressErrorRendering: true,
    fontFamily: '-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif'
  });

  await mermaid.parse(code);   // throws a readable syntax error before rendering

  const id = 'mz' + (++seq);
  const { svg } = await mermaid.render(id, code);
  stage.innerHTML = svg;
  const el = stage.querySelector('svg');
  if (!el) throw new Error('mermaid produced no SVG');

  // mermaid sizes the SVG with `width="100%"` + `style="max-width:Npx"` and no
  // height attribute (useMaxWidth default), so it has no intrinsic pixel size to
  // measure. Take the natural size from the viewBox and pin explicit width/height
  // so the diagram renders at 100% and can be panned/zoomed.
  const vb = el.viewBox && el.viewBox.baseVal;
  if (vb && vb.width > 0 && vb.height > 0) {
    natW = Math.ceil(vb.width);
    natH = Math.ceil(vb.height);
  } else {
    // Fallback: force intrinsic layout and measure.
    el.style.maxWidth = 'none';
    await new Promise(function (r) { setTimeout(r, 0); });
    const b = el.getBoundingClientRect();
    natW = Math.max(1, Math.ceil(b.width));
    natH = Math.max(1, Math.ceil(b.height));
  }
  el.setAttribute('width', natW);
  el.setAttribute('height', natH);
  el.style.maxWidth = 'none';
  stage.style.width = natW + 'px';
  stage.style.height = natH + 'px';

  // Let layout settle before fitting. setTimeout (unlike requestAnimationFrame)
  // still fires off-screen, so this never hangs in a not-yet-visible sheet.
  await new Promise(function (r) { setTimeout(r, 0); });
  resetZoom();
  return natH;
}
</script>
</body>
</html>
