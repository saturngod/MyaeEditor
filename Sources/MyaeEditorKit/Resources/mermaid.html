<!doctype html>
<html>
<head>
<meta charset="utf-8">
<!-- Render host for MermaidWebView.swift. Bundled mermaid 11.16.0. -->
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; }
  #container { width: 100%; }
  #container svg { display: block; max-width: 100%; height: auto; }
</style>
<script src="mermaid.min.js"></script>
</head>
<body>
<div id="container"></div>
<script>
let seq = 0;

// Install an SVG into #container at the current page width and return its height.
// Cached SVG can use this path without re-running Mermaid's parser and renderer.
async function installMermaid(svg, bg) {
  document.documentElement.style.background = bg;
  document.body.style.background = bg;
  const c = document.getElementById('container');
  c.innerHTML = svg;
  const el = c.querySelector('svg');
  if (!el) throw new Error('mermaid produced no SVG');
  el.removeAttribute('height');
  el.style.maxWidth = '100%';
  el.style.height = 'auto';
  await new Promise(function (r) { setTimeout(r, 0); });
  return Math.ceil(el.getBoundingClientRect().height);
}

// Render `code` into #container at the current page width and return both SVG
// and height. Throws (rejects) on a mermaid syntax error — the message
// surfaces to Swift, which sizes the web view to the returned height.
//   theme: 'default' | 'dark'
//   bg:    opaque page background hex, so it blends with the block card
async function renderMermaid(code, theme, bg) {
  document.documentElement.style.background = bg;
  document.body.style.background = bg;

  mermaid.initialize({
    startOnLoad: false,
    theme: theme,
    securityLevel: 'strict',
    suppressErrorRendering: true,
    fontFamily: '-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif'
  });

  await mermaid.parse(code);   // throws a readable syntax error before rendering

  const id = 'm' + (++seq);
  const { svg } = await mermaid.render(id, code);

  const height = await installMermaid(svg, bg);
  return { svg: svg, height: height };
}
</script>
</body>
</html>
